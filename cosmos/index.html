<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000 url(https://i.imgur.com/bsqWdBi.jpg) no-repeat center center;
            background-size: cover;
            overflow: hidden;
            font-family: sans-serif;
        }
        .msg {
            color: #fff;
            text-align: center;
            font-size: 14px;
            font-weight: normal;
            margin-top: 150px; /* Отступ сверху для текста про Хьюстон */
            animation: flicker 2s ease infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .astro-wrap {
            width: 265px;
            height: 430px;
            margin: 0 auto;
            position: relative;
        }
        .astronaut {
            background: url(https://i.imgur.com/VurcHkh.png);
            width: 265px;
            height: 429px;
            position: absolute;
            top: 0; left: 0;
            transform: translate(0,50px);
            animation: move 10s infinite;
        }
        @keyframes move {
            0%, 100% { transform: translate(0,50px); }
            50% { transform: translate(20px,100px); }
        }
        @keyframes flicker {
            0%, 80%, 93%, 100% { opacity: 0.9; }
            30%, 88%, 95%, 98% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1 class="msg">..shhh.. ..houston... ..404... ..shhhh... ..lost.. ..in.. ..space. .shhhhh...</h1>
    <div class="astro-wrap">
        <div class="astronaut"></div>
    </div>
</body>
</html>
