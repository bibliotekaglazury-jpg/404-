<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 0, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 2; pointer-events: none;
        }
        .glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(31, 240, 66, 0.05) 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 1; pointer-events: none;
        }
        /* Анимация бегущей полосы */
        .scanline {
            width: 100%; height: 100px; z-index: 3; position: absolute;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(31, 240, 66, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; animation: scan 8s linear infinite;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="glow"></div>
    <div class="scanline"></div>
</body>
</html>
