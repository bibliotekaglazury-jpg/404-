<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Светлый фон как в оригинале */
        html, body { 
            height: 100%; overflow: hidden; margin: 0; 
            background: #fff;
            background: linear-gradient(0deg, #f4f7f9 0%, #ffffff 100%);
        }
        .error-page {
            display: flex; align-items: center; justify-content: center; text-align: center;
            height: 100%; font-family: Arial, sans-serif; position: relative; z-index: 2;
        }
        h1 {
            font-size: 30vh; font-weight: bold; position: relative; margin: -8vh 0 0; padding: 0; color: transparent;
            background: -webkit-repeating-linear-gradient(-45deg, #71b7e6, #69a6ce, #b98acc, #ee8176, #b98acc, #69a6ce, #9b59b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 400%; animation: animateTextBackground 10s ease-in-out infinite;
        }
        p { color: #333; font-size: 8vh; font-weight: bold; line-height: 10vh; margin: 0; text-transform: uppercase; opacity: 0.1; }
        #particles-js { position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 1; }
        @keyframes animateTextBackground {
            0%, 100% { background-position: 0 0; }
            25% { background-position: 100% 0; }
            50% { background-position: 100% 100% }
            75% { background-position: 0 100%; }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="error-page">
        <div>
            <h1>404</h1>
            <p>NOT FOUND</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 6, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#e0e0e0" }, /* Серые частицы для белого фона */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 150, "random": false, "anim": { "enable": true, "speed": 10, "size_min": 60, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 4, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
