<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --white: #FFFFFF; --red: #FF3F3F; --dark-red: #AA2727; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--red); font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* КРУГИ */
        .circles-layer .circle {
            position: absolute; top: 50%; left: 50%; height: 300vw; width: 300vw;
            transform: translateX(-50%) translateY(-50%) scale(0); border-radius: 50%;
            animation: circle-animation 7s linear infinite; will-change: transform;
        }
        .circle.-white { border: 35vw solid var(--white); }
        .circle.-red { border: 30vw solid var(--dark-red); }
        .circle:nth-child(2) { animation-delay: 0.1s; }
        .circle:nth-child(3) { animation-delay: 0.2s; }
        .circle:nth-child(4) { animation-delay: 0.3s; }
        @keyframes circle-animation {
            0% { transform: translateX(-50%) translateY(-50%) scale(0); }
            15% { transform: translateX(-50%) translateY(-50%) scale(1); }
            100% { transform: translateX(-50%) translateY(-50%) scale(1); }
        }

        /* ЦИФРЫ - ГИГАНТСКИЕ И РАЗБРОСАННЫЕ */
        .number {
            position: absolute; font-size: clamp(250px, 55vh, 700px); color: var(--white);
            transform: scale(0); opacity: 0; font-weight: 900; line-height: 0.7;
            animation: number-animation 7s linear infinite; pointer-events: none;
        }
        .number.-with-shadow { text-shadow: 4vh 4vh var(--dark-red); }
        @keyframes number-animation {
            0% { transform: scale(0); opacity: 0; }
            5% { transform: scale(1.1); opacity: 1; }
            15% { transform: scale(1); opacity: 1; }
            25% { transform: scale(1); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* КООРДИНАТЫ ШЕФА */
        .number:nth-child(1) { top: -10%; left: -5%; animation-delay: 0.5s; font-size: 45vh; }
        .number:nth-child(2) { top: 5%; left: 70%; animation-delay: 1.2s; font-size: 60vh; }
        .number:nth-child(3) { top: 45%; left: -15%; animation-delay: 2.5s; font-size: 50vh; }
        .number:nth-child(4) { top: 70%; left: 10%; animation-delay: 0.2s; }
        .number:nth-child(5) { top: 15%; left: 40%; animation-delay: 3.8s; font-size: 65vh; }
        .number:nth-child(6) { top: 75%; left: 55%; animation-delay: 1.8s; }
        .number:nth-child(9) { top: 35%; left: 25%; animation-delay: 0.8s; font-size: 70vh; }
        .number:nth-child(10) { top: 55%; left: 75%; animation-delay: 2.2s; font-size: 55vh; }
    </style>
</head>
<body>
    <div class="circles-layer">
        <div class="circle -white"></div><div class="circle -red"></div>
        <div class="circle -white"></div><div class="circle -red"></div>
    </div>
    <div class="numbers-layer">
        <div class="number">4</div><div class="number">4</div><div class="number">4</div>
        <div class="number">4</div><div class="number">4</div><div class="number">4</div>
        <div class="number -with-shadow">0</div><div class="number -with-shadow">0</div>
    </div>
</body>
</html>
