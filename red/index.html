<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Tier 1 Engine - SHOPER_DEV</title>
    <!-- Подключаем Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --red: #FF3F3F;
            --dark-red: #AA2727;
            --font: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--red);
            font-family: var(--font);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        .page-wrapper {
            position: relative;
            height: 100vh; width: 100vw;
            overflow: hidden;
            background: var(--red);
        }

        /* --- КРУГИ (ФОН) --- */
        .circles-layer .circle {
            position: absolute;
            top: 50%; left: 50%;
            height: 300vw; width: 300vw;
            transform: translateX(-50%) translateY(-50%) scale(0);
            border-radius: 50%;
            animation: circle-animation 7s linear infinite;
            will-change: transform;
        }
        .circle.-white { border: 35vw solid var(--white); }
        .circle.-red { border: 30vw solid var(--dark-red); }
        
        .circle:nth-child(2) { animation-delay: 0.1s; }
        .circle:nth-child(3) { animation-delay: 0.2s; }
        .circle:nth-child(4) { animation-delay: 0.3s; }

        @keyframes circle-animation {
            0%   { transform: translateX(-50%) translateY(-50%) scale(0); }
            12%  { transform: translateX(-50%) translateY(-50%) scale(1); }
            100% { transform: translateX(-50%) translateY(-50%) scale(1); }
        }

        /* --- ЦИФРЫ (ГИГАНТСКИЕ ПО ЗАПРОСУ ШЕФА) --- */
        .number {
            position: absolute;
            font-size: clamp(200px, 55vh, 600px); /* РЕАЛЬНО ОГРОМНЫЕ */
            color: var(--white);
            transform: scale(0);
            opacity: 0;
            font-weight: 900;
            line-height: 0.7;
            animation: number-animation 7s linear infinite;
            will-change: transform, opacity;
            z-index: 5;
            pointer-events: none; /* Чтобы не мешали кликать на кнопки */
        }
        .number.-with-shadow { text-shadow: 3vh 3vh var(--dark-red); }

        @keyframes number-animation {
            0%   { transform: scale(0); opacity: 0; }
            3%   { transform: scale(0); opacity: 0; }
            7%   { transform: scale(1.15); opacity: 1; }
            11%  { transform: scale(1); opacity: 1; }
            22%  { transform: scale(1); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ХАОТИЧНАЯ РАССТАНОВКА И СУПЕР ТАЙМИНГИ */
        .number:nth-child(1)  { top: -5%; left: -5%; animation-delay: 0.3s; font-size: 45vh; }
        .number:nth-child(2)  { top: 5%;  left: 60%; animation-delay: 1.0s; font-size: 60vh; }
        .number:nth-child(3)  { top: 45%; left: -10%; animation-delay: 2.2s; font-size: 50vh; }
        .number:nth-child(4)  { top: 60%; left: 20%; animation-delay: 0.1s; }
        .number:nth-child(5)  { top: 15%; left: 75%; animation-delay: 3.5s; font-size: 30vh; }
        .number:nth-child(6)  { top: 75%; left: 50%; animation-delay: 1.5s; }
        
        /* НУЛИ С ТЕНЬЮ */
        .number:nth-child(9)  { top: 30%; left: 25%; animation-delay: 0.7s; font-size: 65vh; }
        .number:nth-child(10) { top: 55%; left: 65%; animation-delay: 2.0s; font-size: 55vh; }

        /* --- UI ИНТЕРФЕЙС (MONTSERRAT) --- */
        .ui-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 550px;
            z-index: 1000;
            text-align: center;
            color: #fff;
        }

        .oops-msg { 
            font-size: 2.2rem; font-weight: 900; margin-bottom: 30px; 
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }

        .search-box {
            display: flex; background: #fff; border-radius: 50px; padding: 4px; margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .search-box input {
            flex-grow: 1; border: none; padding: 15px 25px; border-radius: 50px; 
            outline: none; font-size: 16px; font-family: var(--font); color: #222; font-weight: 700;
        }
        .search-box button {
            background: var(--dark-red); color: #fff; border: none; 
            padding: 0 35px; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-links a {
            background: #000; color: #fff; text-decoration: none;
            padding: 10px 20px; border-radius: 4px; font-size: 11px; font-weight: 900; 
            transition: all 0.3s; letter-spacing: 1px;
        }
        .nav-links a:hover { background: #fff; color: #000; transform: translateY(-2px); }
        .nav-links a.promo-btn { background: var(--accent); color: #000; }

        .contacts { 
            font-size: 15px; font-weight: 900; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
            letter-spacing: 1px;
        }
        .contacts a { 
            color: var(--white); 
            text-decoration: none !important; /* УБРАЛ ПОДЧЕРКИВАНИЕ */
            margin: 0 10px;
        }
        .contacts a:hover { color: var(--accent); }

        @media (max-height: 600px) {
            .number { font-size: 40vh; }
            .oops-msg { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <!-- ФОНОВЫЕ КРУГИ -->
        <div class="circles-layer">
            <div class="circle -white"></div>
            <div class="circle -red"></div>
            <div class="circle -white"></div>
            <div class="circle -red"></div>
        </div>

        <!-- ГИГАНТСКИЕ ЦИФРЫ -->
        <div class="numbers-layer">
            <div class="number">4</div><div class="number">4</div>
            <div class="number">4</div><div class="number">4</div>
            <div class="number">4</div><div class="number">4</div>
            <div class="number -with-shadow">0</div>
            <div class="number -with-shadow">0</div>
        </div>

        <!-- UI HUB -->
        <div class="ui-hub">
            <div class="oops-msg">Ups! Zgubiłeś się?</div>
            
            <form class="search-box" id="search-form" action="" method="get" target="_top">
                <input type="text" name="search" placeholder="Czego szukasz?">
                <button type="submit" class="search-btn">Szukaj</button>
            </form>

            <div class="nav-links">
                <a href="/" id="link-home" target="_top">HOME</a>
                <a href="/pl/new" id="link-new" target="_top">NOWOŚCI</a>
                <a href="/pl/promotions" id="link-promo" class="promo-btn" target="_top">PROMOCJE</a>
                <a href="/kontakt" id="link-contact" target="_top">KONTAKT</a>
            </div>

            <div class="contacts">
                Tel: <a href="#" id="shop-phone">...</a>  |  Email: <a href="#" id="shop-email">...</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            let base = params.get('url') || window.location.origin;
            if (base.endsWith('/')) base = base.slice(0, -1);
            const phone = params.get('phone');
            const email = params.get('email');

            if (phone && !phone.includes('{')) {
                document.getElementById('shop-phone').innerText = phone;
                document.getElementById('shop-phone').href = "tel:" + phone.replace(/\s+/g, '');
            }
            if (email && !email.includes('{')) {
                document.getElementById('shop-email').innerText = email;
                document.getElementById('shop-email').href = "mailto:" + email;
            }

            document.getElementById('link-home').href = base + "/";
            document.getElementById('link-new').href = base + "/pl/new";
            document.getElementById('link-promo').href = base + "/pl/promotions";
            document.getElementById('link-contact').href = base + "/pl/contact";
            document.getElementById('search-form').action = base + "/pl/search";
        })();
    </script>
</body>
</html>
