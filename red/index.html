<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Tier 1 Engine - SHOPER_DEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- MASTER CSS (FLATTENED) --- */
        :root {
            --white: #FFFFFF;
            --red: #FF3F3F;
            --dark-red: #AA2727;
            --font: 'Yanone Kaffeesatz', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--red);
            font-family: var(--font);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-wrapper {
            position: relative;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--red);
        }

        /* КРУГИ */
        .circles-layer .circle {
            position: absolute;
            top: 50%;
            left: 50%;
            height: 300vw;
            width: 300vw;
            transform: translateX(-50%) translateY(-50%) scale(0);
            border-radius: 50%;
            animation: circle-animation 10s linear infinite;
            will-change: transform;
        }
        .circle.-white { border: 30vw solid var(--white); }
        .circle.-red { border: 25vw solid var(--dark-red); }
        .circle:nth-of-type(2) { animation-delay: 100ms; }
        .circle:nth-of-type(3) { animation-delay: 150ms; }
        .circle:nth-of-type(4) { animation-delay: 200ms; }

        @keyframes circle-animation {
            0%   { transform: translateX(-50%) translateY(-50%) scale(0); }
            10%  { transform: translateX(-50%) translateY(-50%) scale(1); }
            100% { transform: translateX(-50%) translateY(-50%) scale(1); }
        }

        /* ЦИФРЫ */
        .number {
            position: absolute;
            font-size: 10rem;
            color: var(--white);
            transform: scale(0);
            opacity: 0;
            font-weight: 200;
            animation: number-animation 10s linear infinite;
        }
        .number.-with-shadow { text-shadow: 1rem 1rem var(--dark-red); }

        @keyframes number-animation {
            0%, 30%, 40%, 50%, 60%, 70%, 80%, 100% { transform: scale(0); opacity: 0; }
            32%, 37% { transform: scale(1); opacity: 1; }
            52%, 57% { transform: scale(0.5); opacity: 1; }
            72%, 77% { transform: scale(0.8); opacity: 1; }
        }

        /* РАССТАНОВКА ЦИФР */
        .number:nth-of-type(1)  { top: 5%;  left: 5%;  animation-delay: 0s; }
        .number:nth-of-type(2)  { top: 15%; left: 55%; animation-delay: 40ms; font-size: 15rem; }
        .number:nth-of-type(3)  { top: 25%; left: 15%; animation-delay: 80ms; }
        .number:nth-of-type(4)  { top: 75%; left: 20%; animation-delay: 120ms; }
        .number:nth-of-type(5)  { top: 25%; left: 75%; animation-delay: 160ms; font-size: 6rem; }
        .number:nth-of-type(6)  { top: 65%; left: 45%; animation-delay: 200ms; } 
        .number:nth-of-type(9)  { top: 40%; left: 35%; animation-delay: 320ms; font-size: 15rem; }
        .number:nth-of-type(10) { top: 70%; left: 65%; animation-delay: 360ms; }

        /* --- UI HUB (SHOPER ENGINE) --- */
        .ui-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 500px;
            z-index: 1000;
            text-align: center;
            color: #fff;
        }

        .oops-msg { font-size: 32px; font-weight: 700; margin-bottom: 30px; text-transform: uppercase; }

        .search-box {
            display: flex; background: #fff; border-radius: 50px; padding: 5px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-box input {
            flex-grow: 1; border: none; padding: 12px 25px; border-radius: 50px; 
            outline: none; font-size: 18px; font-family: var(--font);
        }
        .search-box button {
            background: var(--dark-red); color: #fff; border: none; 
            padding: 10px 30px; border-radius: 40px; font-weight: 700; cursor: pointer;
        }

        .nav-links { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .nav-links a {
            background: rgba(0,0,0,0.3); color: #fff; text-decoration: none;
            padding: 10px 20px; border-radius: 4px; font-size: 14px; font-weight: 700;
        }

        .contacts { font-size: 16px; font-weight: 700; }
        .contacts a { color: var(--white); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <!-- АНИМИРОВАННЫЙ ФОН -->
        <div class="circles-layer">
            <div class="circle -white"></div>
            <div class="circle -red"></div>
            <div class="circle -white"></div>
            <div class="circle -red"></div>
        </div>

        <div class="numbers-layer">
            <div class="number">4</div><div class="number">4</div>
            <div class="number">4</div><div class="number">4</div>
            <div class="number">4</div><div class="number">4</div>
            <div class="number -with-shadow">0</div><div class="number -with-shadow">0</div>
        </div>

        <!-- ЦЕНТРАЛЬНЫЙ ИНТЕРФЕЙС -->
        <div class="ui-hub">
            <div class="oops-msg">Ups! Wygląda на to, że się zgubiłeś</div>
            
            <form class="search-box" id="search-form" action="" method="get" target="_top">
                <input type="text" name="search" placeholder="Czego szukasz?">
                <button type="submit">Szukaj</button>
            </form>

            <div class="nav-links">
                <a href="/" id="link-home" target="_top">HOME</a>
                <a href="/pl/new" id="link-new" target="_top">NOWOŚCI</a>
                <a href="/kontakt" id="link-contact" target="_top">KONTAKT</a>
            </div>

            <div class="contacts">
                Tel: <a href="#" id="shop-phone">...</a> | Email: <a href="#" id="shop-email">...</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            let base = params.get('url') || window.location.origin;
            if (base.endsWith('/')) base = base.slice(0, -1);
            const phone = params.get('phone');
            const email = params.get('email');

            if (phone && !phone.includes('{')) {
                document.getElementById('shop-phone').innerText = phone;
                document.getElementById('shop-phone').href = "tel:" + phone.replace(/\s+/g, '');
            }
            if (email && !email.includes('{')) {
                document.getElementById('shop-email').innerText = email;
                document.getElementById('shop-email').href = "mailto:" + email;
            }

            document.getElementById('link-home').href = base + "/";
            document.getElementById('link-new').href = base + "/pl/new";
            document.getElementById('link-contact').href = base + "/pl/contact";
            document.getElementById('search-form').action = base + "/pl/search";
        })();
    </script>
</body>
</html>
