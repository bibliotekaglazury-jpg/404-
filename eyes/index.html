<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центр по горизонтали */
            justify-content: flex-start; /* Прижимаем к верху */
            padding-top: 20px !important; /* ШЕФ, ВОТ ТВОИ 20 ПИКСЕЛЕЙ */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .eyes-row { 
            display: flex; 
            gap: 30px; 
            animation: shvr .2s infinite; 
            position: relative;
        }
        
        .eye { 
            width: 100px; height: 100px; 
            background: #fff; border-radius: 50%; 
            position: relative; overflow: hidden; 
        }
        
        .pupil { 
            width: 35px; height: 35px; 
            background: #000; border-radius: 50%; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            will-change: transform;
        }

        @keyframes shvr {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

    <div class="eyes-row">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <script>
        const pupils = document.querySelectorAll('.pupil');
        
        // СЛЕЖКА ЗА МЫШКОЙ (РАБОЧАЯ)
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            
            pupils.forEach(pupil => {
                const rect = pupil.parentElement.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                
                const angle = Math.atan2(clientY - eyeY, clientX - eyeX);
                const distance = 25; // Радиус движения зрачка
                
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                pupil.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });
    </script>
</body>
</html>
