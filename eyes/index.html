<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ПОЗИЦИЯ ГЛАЗ - ПОДНЯЛ ВЫШЕ ПО ПРИКАЗУ ШЕФА */
        .eyes-row { 
            display: flex; 
            gap: 35px; 
            margin-top: -250px; /* Было -150, теперь -250. Будут прямо над поиском */
            animation: shvr .2s infinite; 
        }
        
        .eye { 
            width: 110px; height: 110px; /* Чуть увеличил размер */
            background: #fff; border-radius: 50%; 
            position: relative; overflow: hidden; 
        }
        
        .pupil { 
            width: 40px; height: 40px; 
            background: #000; border-radius: 50%; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        @keyframes shvr {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

    <div class="eyes-row">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <script>
        const pupils = document.querySelectorAll('.pupil');
        
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            
            pupils.forEach(pupil => {
                const rect = pupil.parentElement.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                
                // Рассчитываем угол
                const angle = Math.atan2(clientY - eyeY, clientX - eyeX);
                // Радиус движения внутри белка
                const distance = 30; 
                
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                pupil.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });
    </script>
</body>
</html>
