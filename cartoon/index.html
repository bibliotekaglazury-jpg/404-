<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 404 Engine - SHOPER_DEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffdb00; --dark: #2F1829; --bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 750px; /* Фикс высота под Shoper */
            width: 100%;
            overflow: hidden;
            padding-top: 20px;
        }

        /* --- 1. АНИМАЦИЯ (SVG) --- */
        .svg-container {
            width: 100%;
            max-width: 700px;
            position: relative;
            cursor: default;
        }
        
        /* CSS анимации для персонажей */
        #handboy { animation: swing 1.3s infinite alternate ease-in-out; transform-origin: 98% 98%; transform-box: fill-box; }
        #girllight { animation: swing 1.3s infinite alternate ease-in-out; transform-origin: 0% 97%; transform-box: fill-box; }
        #hairgirl { animation: swinghair 1.3s infinite alternate ease-in-out; transform-origin: 60% 0%; transform-box: fill-box; }
        #zero { transform-origin: bottom; transform-box: fill-box; }

        @keyframes swing { 0% { transform: rotate(10deg); } 100% { transform: rotate(-10deg); } }
        @keyframes swinghair { 0% { transform: rotate(6deg); } 100% { transform: rotate(-6deg); } }

        /* --- 2. ИНТЕРФЕЙС (UI) --- */
        .ui-container {
            width: 100%;
            max-width: 600px;
            margin-top: -40px; /* Наплыв на основание SVG */
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Поиск */
        .search-box {
            width: 90%; display: flex; 
            background: #fff; border: 2px solid var(--dark); border-radius: 50px; 
            padding: 4px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-box input {
            flex-grow: 1; border: none; padding: 12px 25px; 
            border-radius: 50px; outline: none; font-size: 15px; font-family: inherit;
        }
        .search-btn {
            background: var(--dark); color: #fff; border: none; 
            padding: 10px 30px; border-radius: 40px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; font-size: 12px;
        }

        /* Ссылки-вкладки */
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            background: var(--dark); color: #fff; text-decoration: none;
            padding: 10px 20px; border-radius: 8px 8px 0 0;
            font-size: 11px; font-weight: 900; transition: 0.3s;
        }
        .nav-links a:hover { background: var(--accent); color: var(--dark); }

        /* Контакты */
        .contacts-bar { 
            margin-top: 25px; font-size: 13px; color: var(--dark); font-weight: 900; 
            display: flex; gap: 20px; opacity: 0.8;
        }
        .contacts-bar a { position: static; color: var(--dark); text-decoration: underline; font-size: 13px; }

        @media (max-width: 600px) {
            .svg-container { transform: scale(0.8); }
            .ui-container { margin-top: -60px; scale: 0.9; }
        }
    </style>
</head>
<body>

    <div class="svg-container">
        <!-- ТВОЙ SVG КОД (Вставь его сюда целиком) -->
        <svg width="100%" height="auto" viewBox="0 0 636 324" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g id="OBJECTS">
                <path id="Base" d="M101.3 255.2C101.3 255.2 111.1 272.6 181.8 280.5C252.5 288.4 288.2 314.9 333.1 322.8C378 330.7 433.6 278.5 481.8 286.5C530 294.4 588.2 264.2 592.8 255.2H101.3Z" fill="#2F1829"/>
                <path id="Cloud" d="M611.9 251.7H601.4L140.8 251.8C140.8 251.8 136.1 248.1 128.9 241.8C125.8 239.1 122.2 235.9 118.3 232.3..." fill="#F6F1E3"/>
                <!-- ВСТАВЬ СЮДА ВСЕ PATH ПЕРСОНАЖЕЙ С ИХ ID -->
            </g>
        </svg>
    </div>

    <div class="ui-container">
        <!-- ПОИСК -->
        <form class="search-box" id="search-form" action="" method="get" target="_top">
            <input type="text" name="search" placeholder="Czego szukasz?">
            <button type="submit" class="search-btn">SZUKAJ</button>
        </form>

        <!-- НАВИГАЦИЯ -->
        <div class="nav-links">
            <a href="/" id="link-home" target="_top">HOME</a>
            <a href="/pl/new" id="link-new" target="_top">NOWOŚCI</a>
            <a href="/pl/promotions" id="link-promo" target="_top">PROMOCJE</a>
            <a href="/kontakt" id="link-contact" target="_top">KONTAKT</a>
        </div>

        <!-- КОНТАКТЫ -->
        <div class="contacts-bar">
            <div>Tel: <a href="#" id="shop-phone">...</a></div>
            <div>Email: <a href="#" id="shop-email">...</a></div>
        </div>
    </div>

    <!-- БИБЛИОТЕКИ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
        // --- 1. АНИМАЦИЯ ЛЕТАНИЯ (ТВОЯ) ---
        anime({ targets: '.svg-container', translateY: 10, loop: true, direction: 'alternate', easing: 'easeInOutSine' });
        
        // --- 2. АНИМАЦИЯ НУЛЯ (ТВОЯ) ---
        anime({
            targets: '#zero',
            translateX: 10,
            loop: true,
            direction: 'alternate',
            easing: 'easeInOutSine',
            scale: [{value: 1}, {value: 1.2}, {value: 1, delay: 250}],
            rotateY: {value: '+=180', delay: 200},
        });

        // --- 3. СВЯЗЬ С SHOPER (УНИВЕРСАЛЬНЫЙ РОУТЕР) ---
        (function() {
            const p = new URLSearchParams(window.location.search);
            let b = p.get('url') || window.location.origin;
            if (b.endsWith('/')) b = b.slice(0, -1);
            
            const phone = p.get('phone');
            const email = p.get('email');

            if (phone && !phone.includes('{')) {
                document.getElementById('shop-phone').innerText = phone;
                document.getElementById('shop-phone').href = "tel:" + phone.replace(/\s+/g, '');
            }
            if (email && !email.includes('{')) {
                document.getElementById('shop-email').innerText = email;
                document.getElementById('shop-email').href = "mailto:" + email;
            }

            document.getElementById('link-home').href = b + "/";
            document.getElementById('link-new').href = b + "/pl/new";
            document.getElementById('link-promo').href = b + "/pl/promotions";
            document.getElementById('link-contact').href = b + "/pl/contact";
            document.getElementById('search-form').action = b + "/pl/search";
        })();
    </script>
</body>
</html>
