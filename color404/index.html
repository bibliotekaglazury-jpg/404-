<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600,700');
        @import url('https://fonts.googleapis.com/css?family=Catamaran:400,800');

        * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
    background-color: #416475;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    
    /* 1. МЕНЯЕМ ЭТУ СТРОКУ: */
    justify-content: flex-start; /* Было center, теперь прижимаем к верху */
    
    /* 2. ДОБАВЛЯЕМ ЭТУ СТРОКУ (ТВОЙ РЫЧАГ ВЫСОТЫ): */
    padding-top: 50px; /* Чем больше число, тем НИЖЕ упадет 404 */
    
    flex-direction: column; /* Чтобы всё шло сверху вниз */
}

        .error-container {
            text-align: center;
            font-size: clamp(120px, 25vw, 180px);
            font-family: 'Catamaran', sans-serif;
            font-weight: 800;
            margin-top: -100px; /* Поднимаем для места под Shoper UI */
        }

        .error-container > span {
            display: inline-block;
            line-height: 0.7;
            position: relative;
            vertical-align: middle;
        }

        .error-container > span:nth-of-type(1) {
            color: #D1F2A5;
            animation: colordancing 4s infinite;
        }

        .error-container > span:nth-of-type(3) {
            color: #F56991;
            animation: colordancing2 4s infinite;
        }

        .error-container > span:nth-of-type(2) {
            width: 120px;
            height: 120px;
            border-radius: 999px;
            margin: 0 10px;
        }

        .error-container > span:nth-of-type(2):before,
        .error-container > span:nth-of-type(2):after {
            content:"";
            position: absolute;
            top: 0; left: 0;
            width: inherit; height: inherit;
            border-radius: 999px;
            box-shadow: inset 30px 0 0 rgba(209, 242, 165, 0.4),
                        inset 0 30px 0 rgba(239, 250, 180, 0.4),
                        inset -30px 0 0 rgba(255, 196, 140, 0.4),	
                        inset 0 -30px 0 rgba(245, 105, 145, 0.4);
            animation: shadowsdancing 4s infinite;
        }

        .error-container > span:nth-of-type(2):before { transform: rotate(45deg); }

        @keyframes shadowsdancing {
            0% { box-shadow: inset 30px 0 0 rgba(209, 242, 165, 0.4), inset 0 30px 0 rgba(239, 250, 180, 0.4), inset -30px 0 0 rgba(255, 196, 140, 0.4), inset 0 -30px 0 rgba(245, 105, 145, 0.4); }
            25% { box-shadow: inset 30px 0 0 rgba(245, 105, 145, 0.4), inset 0 30px 0 rgba(209, 242, 165, 0.4), inset -30px 0 0 rgba(239, 250, 180, 0.4), inset 0 -30px 0 rgba(255, 196, 140, 0.4); }
            50% { box-shadow: inset 30px 0 0 rgba(255, 196, 140, 0.4), inset 0 30px 0 rgba(245, 105, 145, 0.4), inset -30px 0 0 rgba(209, 242, 165, 0.4), inset 0 -30px 0 rgba(239, 250, 180, 0.4); }
            75% { box-shadow: inset 30px 0 0 rgba(239, 250, 180, 0.4), inset 0 30px 0 rgba(255, 196, 140, 0.4), inset -30px 0 0 rgba(245, 105, 145, 0.4), inset 0 -30px 0 rgba(209, 242, 165, 0.4); }
            100% { box-shadow: inset 30px 0 0 rgba(209, 242, 165, 0.4), inset 0 30px 0 rgba(239, 250, 180, 0.4), inset -30px 0 0 rgba(255, 196, 140, 0.4), inset 0 -30px 0 rgba(245, 105, 145, 0.4); }
        }

        @keyframes colordancing {
            0%, 100% { color: #D1F2A5; }
            25% { color: #F56991; }
            50% { color: #FFC48C; }
            75% { color: #EFFAB4; }
        }

        @keyframes colordancing2 {
            0%, 100% { color: #FFC48C; }
            25% { color: #EFFAB4; }
            50% { color: #D1F2A5; }
            75% { color: #F56991; }
        }
    </style>
</head>
<body>
    <section class="error-container">
        <span>4</span>
        <span></span>
        <span>4</span>
    </section>
</body>
</html>
