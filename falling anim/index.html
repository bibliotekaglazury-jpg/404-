<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600,700');
        @import url('https://fonts.googleapis.com/css?family=Catamaran:400,800');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10px; /* Минимум сверху */
            height: 100vh;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            font-size: 150px; /* Чуть уменьшил, чтобы влезло */
            font-family: 'Catamaran', sans-serif;
            font-weight: 800;
        }
        .error-container > span {
            display: inline-block;
            line-height: 0.8;
            position: relative;
            color: #FFB485;
        }
        .error-container > span > span { display: inline-block; position: relative; }
        .error-container > span:nth-of-type(1) { perspective: 1000px; color: #F0E395; }
        .error-container > span:nth-of-type(1) > span {
            transform-origin: 50% 100% 0px;
            animation: easyoutelastic 8s infinite;
        }
        .error-container > span:nth-of-type(3) { color: #D15C95; }
        .error-container > span:nth-of-type(3) > span {
            transform-origin: 100% 100% 0px;
            animation: rotatedrop 8s infinite;
        }
        @keyframes easyoutelastic {
            0%, 80%, 100% { transform: rotateX(0); }
            9% { transform: rotateX(210deg); }
            20%, 60% { transform: rotateX(180deg); }
        }
        @keyframes rotatedrop {
            0%, 80%, 100% { transform: rotate(0); }
            15%, 70% { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <section class="error-container">
        <span><span>4</span></span>
        <span>0</span>
        <span><span>4</span></span>
    </section>
</body>
</html>
