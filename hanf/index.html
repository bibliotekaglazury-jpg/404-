        :root { --accent: #ffdb00; --dark: #333333; --bg: #f6f5f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden; text-align: center;
        }
        
        #error { width: 100%; max-width: 400px; height: 400px; display: block; margin: 0 auto; }
        
        /* ИНТЕРФЕЙС УПРАВЛЕНИЯ */
        .ui-container { width: 100%; max-width: 500px; margin-top: -30px; z-index: 100; }
        .search-box {
            display: flex; background: #fff; border: 2px solid var(--dark); border-radius: 50px; 
            padding: 4px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-box input { flex-grow: 1; border: none; padding: 12px 25px; border-radius: 50px; outline: none; font-size: 16px; font-family: inherit; }
        .search-btn { background: var(--dark); color: #fff; border: none; padding: 10px 30px; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        .nav-links { display: flex; gap: 8px; justify-content: center; }
        .nav-links a { background: var(--dark); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-size: 11px; font-weight: 900; transition: 0.3s; }
        .nav-links a:hover { background: var(--accent); color: var(--dark); }
        
        .contacts { margin-top: 20px; font-size: 13px; color: var(--dark); font-weight: 900; }
        .contacts a { color: var(--dark); text-decoration: underline; position: static; font-size: 13px; }
    </style>
</head>

    <!-- 2. ИНТЕРФЕЙС SHOPER -->
    <div class="ui-container">
        <form class="search-box" id="search-form" action="" method="get" target="_top">
            <input type="text" name="search" placeholder="Czego szukasz?">
            <button type="submit" class="search-btn">Szukaj</button>
        </form>
        <div class="nav-links">
            <a href="/" id="link-home" target="_top">HOME</a>
            <a href="/pl/new" id="link-new" target="_top">NOWOŚCI</a>
            <a href="/kontakt" id="link-contact" target="_top">KONTAKT</a>
        </div>
        <div class="contacts">
            Tel: <a href="#" id="shop-phone">...</a> | Email: <a href="#" id="shop-email">...</a>
        </div>
    </div>

    <script>
        // ЛОГИКА SNAP.SVG (Восстановлено)
        window.onload = function () {
            var hand = Snap.select("#svg-hand"),
                mask = Snap.select("#svg-mask");

            function animOn(){
                hand.animate({ transform: "t10,-300, r0" }, 4500, mina.easeinout, animOut);
                mask.animate({ transform: "t-10,300, r0" }, 4500, mina.easeinout);
            }
            function animOut() {
                hand.animate({ transform: "t-10,-305, r0" }, 4500, mina.easeinout, animOn);
                mask.animate({ transform: "t10,305, r0" }, 4500, mina.easeinout);
            }
            function open() {
                hand.animate({ transform: "t0,-300" }, 800, mina.backout, animOn);
                mask.animate({ transform: "t0,300" }, 800, mina.backout);
            }
            setTimeout(open, 500); // Быстрый старт
            hand.attr({ mask: mask });
        };

        // ДИНАМИЧЕСКИЕ ДАННЫЕ
        (function() {
            const p = new URLSearchParams(window.location.search);
            let b = p.get('url') || window.location.origin;
            if (b.endsWith('/')) b = b.slice(0, -1);
            const ph = p.get('phone');
            const em = p.get('email');
            if (ph && !ph.includes('{')) {
                document.getElementById('shop-phone').innerText = ph;
                document.getElementById('shop-phone').href = "tel:" + ph.replace(/\s+/g, '');
            }
            if (em && !em.includes('{')) {
                document.getElementById('shop-email').innerText = em;
                document.getElementById('shop-email').href = "mailto:" + em;
            }
            document.getElementById('link-home').href = b + "/";
            document.getElementById('link-new').href = b + "/pl/new";
            document.getElementById('link-contact').href = b + "/pl/contact";
            document.getElementById('search-form').action = b + "/pl/search";
        })();
    </script>
