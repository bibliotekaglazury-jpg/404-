<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Premium 404 Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffdb00; --text: #ffffff; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; text-align: center; padding: 20px;
        }

        .eyes-row { display: flex; gap: 25px; margin-bottom: 20px; animation: shvr .2s infinite; }
        .eye { width: 80px; height: 80px; background: #fff; border-radius: 50%; position: relative; overflow: hidden; }
        .pupil { width: 30px; height: 30px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: 0.1s ease-out; }

        h1 { font-size: clamp(40px, 8vw, 100px); font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
        p { font-size: 16px; opacity: 0.8; margin-bottom: 40px; max-width: 600px; line-height: 1.5; }

        /* УНИВЕРСАЛЬНЫЙ ПОИСК */
        .search-box { width: 100%; max-width: 500px; position: relative; margin-bottom: 40px; }
        .search-box input {
            width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; font-family: inherit; outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-btn {
            position: absolute; right: 8px; top: 8px; background: var(--accent); border: none;
            padding: 10px 20px; border-radius: 40px; font-weight: 900; cursor: pointer;
        }

        /* КНОПКИ И КОНТАКТЫ */
        .nav-links { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .nav-links a { text-decoration: none; color: #fff; font-size: 12px; font-weight: 700; padding: 10px 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }
        
        .contacts { display: flex; gap: 25px; font-size: 14px; opacity: 0.9; }
        .contacts a { color: var(--accent); text-decoration: none; font-weight: 700; }

        @keyframes shvr {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

    <div class="eyes-row">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <h1 id="shop-name-title">UPS!</h1>
    <p>Nie znaleźliśmy tego, czego szukasz, ale nasze oczy są szeroko otwarte. Skorzystaj z wyszukiwarki:</p>

    <!-- ДИНАМИЧЕСКИЙ ПОИСК -->
    <form class="search-box" id="dynamic-search" action="/pl/search" method="get" target="_top">
        <input type="text" name="search" placeholder="Czego szukasz?">
        <button type="submit" class="search-btn">Szukaj</button>
    </form>

    <div class="nav-links">
        <a href="/" target="_top">STRONA GŁÓWNA</a>
        <a href="/pl/new" target="_top">NOWOŚCI</a>
        <a href="/pl/promotions" target="_top">PROMOCJE</a>
    </div>

    <!-- КОНТАКТЫ ПОДТЯГИВАЮТСЯ ИЗ SHOPER -->
    <div class="contacts">
        <div>Zadzwoń: <a href="#" id="shop-phone">...</a></div>
        <div>Napisz: <a href="#" id="shop-email">...</a></div>
    </div>

    <script>
        // 1. ЛОГИКА ГЛАЗ
        const pupils = document.querySelectorAll('.pupil');
        document.addEventListener('mousemove', (e) => {
            pupils.forEach(pupil => {
                const rect = pupil.parentElement.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 20; 
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });

        // 2. МАГИЯ ПРОГРАММИСТА: ПОЛУЧАЕМ ДАННЫЕ ИЗ URL
        const params = new URLSearchParams(window.location.search);
        const shopPhone = params.get('phone');
        const shopEmail = params.get('email');
        const shopUrl = params.get('url');

        if (shopPhone) {
            document.getElementById('shop-phone').innerText = shopPhone;
            document.getElementById('shop-phone').href = "tel:" + shopPhone.replace(/\s+/g, '');
        }
        if (shopEmail) {
            document.getElementById('shop-email').innerText = shopEmail;
            document.getElementById('shop-email').href = "mailto:" + shopEmail;
        }
        
        // Исправляем пути ссылок, если передан shopUrl
        if (shopUrl) {
            const links = document.querySelectorAll('a[target="_top"], form');
            links.forEach(el => {
                if (el.tagName === 'A') {
                    const currentHref = el.getAttribute('href');
                    if (currentHref.startsWith('/')) el.href = shopUrl.replace(/\/$/, '') + currentHref;
                }
                if (el.tagName === 'FORM') {
                    const currentAction = el.getAttribute('action');
                    el.action = shopUrl.replace(/\/$/, '') + currentAction;
                }
            });
        }
    </script>
</body>
</html>
