<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; }
        body { 
            width: 100vw; height: 100vh; 
            background: linear-gradient(135deg, #8e24aa 0%, #d84315 100%);
            overflow: hidden; 
        }
        #search-icon {
            width: 80px; height: 80px;
            background-color: rgba(121, 134, 203, 0.7);
            border: solid 8px #fff59d;
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 100; transform: rotate(-38deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        #search-icon::after {
            content: ''; background-color: #03a9f4;
            width: 12px; height: 35px;
            position: absolute; bottom: -35px; left: calc(50% - 6px);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="search-icon"></div>
    <script>
        const icon = document.getElementById('search-icon');
        document.addEventListener('mousemove', (e) => {
            icon.style.left = (e.clientX - 40) + 'px';
            icon.style.top = (e.clientY - 40) + 'px';
        });
    </script>
</body>
</html>
